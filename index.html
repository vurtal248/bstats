<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Basketball Stats — Professional Performance Engine">
  <meta name="theme-color" content="#050505">
  <title>B-Stats</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@600;800&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

  <style>
    /*
      MODERN CSS ARCHITECTURE
      Aesthetic: Cyber-Athletics / Dark Glassmorphism 2.0
      Palette: Strict Monochrome
    */
    :root {
      --clr-bg: #050505;
      --clr-surface: rgba(255, 255, 255, 0.03);
      --clr-surface-hover: rgba(255, 255, 255, 0.08);
      --clr-border: rgba(255, 255, 255, 0.08);
      --clr-border-active: rgba(255, 255, 255, 0.4);

      --clr-text-primary: #FFFFFF;
      --clr-text-secondary: #888888;
      --clr-text-dim: #444444;

      --clr-accent: #FFFFFF;
      --clr-accent-glow: rgba(255, 255, 255, 0.3);
      --clr-danger: #FFFFFF;

      --font-display: 'Syne', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);

      /* Spatial tokens */
      --space-edge: clamp(16px, 5vw, 64px);
      --space-gap: clamp(20px, 4vw, 48px);
      --cell-pad-y: 14px;
      --cell-pad-x: 12px;
      --row-h: 50px;
    }

    * {
      box-sizing: border-box;
    }

    /* — Reduced Motion ——————————————————————— */
    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--clr-bg);
      color: var(--clr-text-primary);
      font-family: var(--font-mono);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      grid-template-columns: 100%;
      grid-template-rows: auto 1fr;
      position: relative;
      overflow-x: hidden;
    }

    /* — Ambient Background System ——————————————— */
    .ambient-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at 15% 0%, rgba(255, 255, 255, 0.04) 0%, transparent 50%),
        radial-gradient(circle at 85% 100%, rgba(255, 255, 255, 0.02) 0%, transparent 50%);
    }

    .ambient-noise {
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: 0.25;
      mix-blend-mode: overlay;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    }

    /* — Focus & Accessibility ——————————————————— */
    :focus-visible {
      outline: 2px solid var(--clr-accent);
      outline-offset: 4px;
      border-radius: 2px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    /* — Layout Hierarchy ——————————————————————— */
    .layout-main {
      padding: var(--space-edge);
      max-width: 1800px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--space-gap);
      flex: 1;
      min-height: 0;
      /* flex child scroll fix */
    }

    /* — Header Composition ————————————————————— */
    .header-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: 0;
      position: relative;
      z-index: 100;
      /* JS handles reveal */
    }

    .header-title {
      font-family: var(--font-display);
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: -0.02em;
      font-size: clamp(2.5rem, 6vw, 5rem);
      line-height: 0.9;
      margin: 0;
      background: linear-gradient(180deg, #FFFFFF 0%, rgba(255, 255, 255, 0.5) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 0.85rem;
      color: var(--clr-text-secondary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .header-meta::before {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: var(--clr-accent);
      flex-shrink: 0;
    }

    /* — Data Visualization Grid ————————————————— */
    .data-container {
      position: relative;
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: 4px;
      box-shadow: 0 32px 64px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      overflow: hidden;
      flex: 1;
      display: flex;
      flex-direction: column;
      opacity: 0;
      /* JS handles reveal */
      min-height: 280px;
    }

    .data-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--clr-border-active), transparent);
      opacity: 0.5;
      z-index: 40;
    }

    .scroll-context {
      width: 100%;
      overflow-x: auto;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--clr-text-dim) transparent;
      flex: 1;
      min-height: 0;
      /* flex child scroll fix */
    }

    .scroll-context::-webkit-scrollbar {
      height: 6px;
      width: 6px;
    }

    .scroll-context::-webkit-scrollbar-track {
      background: transparent;
    }

    .scroll-context::-webkit-scrollbar-thumb {
      background: var(--clr-text-dim);
      border-radius: 3px;
    }

    .scroll-context::-webkit-scrollbar-thumb:hover {
      background: var(--clr-text-secondary);
    }

    .stats-grid {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .stats-grid th,
    .stats-grid td {
      padding: var(--cell-pad-y) var(--cell-pad-x);
      text-align: right;
      border-bottom: 1px solid var(--clr-border);
      white-space: nowrap;
      height: var(--row-h);
    }

    .stats-grid th:first-child,
    .stats-grid td:first-child {
      text-align: center;
      width: 80px;
      min-width: 80px;
      position: sticky;
      left: 0;
      z-index: 10;
    }

    /* — Table Headers ——————————————————————————— */
    .stats-grid th {
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--clr-text-secondary);
      background: rgba(10, 10, 10, 0.95);
      position: sticky;
      top: 0;
      z-index: 20;
      cursor: pointer;
      user-select: none;
      transition: color 0.3s var(--ease-out-expo);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .stats-grid th:first-child {
      z-index: 30;
      cursor: default;
      /* # column is not sortable */
    }

    .stats-grid th:hover,
    .stats-grid th:focus-visible {
      color: var(--clr-text-primary);
    }

    .stats-grid th:first-child:hover {
      color: var(--clr-text-secondary);
      /* no hover effect for non-sortable */
    }

    .sort-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-left: 8px;
      opacity: 0;
      transition: transform 0.4s var(--ease-out-expo), opacity 0.3s;
      vertical-align: middle;
    }

    .sort-indicator svg {
      width: 100%;
      height: 100%;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
    }

    th[aria-sort="ascending"] .sort-indicator {
      opacity: 1;
      transform: rotate(180deg);
      color: var(--clr-accent);
    }

    th[aria-sort="descending"] .sort-indicator {
      opacity: 1;
      transform: rotate(0deg);
      color: var(--clr-accent);
    }

    /* — Row Aesthetics —————————————————————————— */
    .stats-grid tbody tr {
      transition: background-color 0.3s var(--ease-out-expo);
    }

    .stats-grid tbody tr:hover,
    .stats-grid tbody tr:focus-within {
      background-color: var(--clr-surface-hover);
    }

    .stats-grid td:first-child {
      background: var(--clr-bg);
      transition: background-color 0.3s var(--ease-out-expo);
    }

    .stats-grid tbody tr:hover td:first-child,
    .stats-grid tbody tr:focus-within td:first-child {
      background-color: var(--clr-surface-hover);
    }

    /* — Cell Interactions —————————————————————— */
    .cell-interactive {
      cursor: pointer;
      position: relative;
      transition: color 0.3s var(--ease-out-expo), text-shadow 0.3s;
    }

    .cell-interactive:hover {
      color: var(--clr-accent);
      text-shadow: 0 0 16px var(--clr-accent-glow);
    }

    .cell-computed {
      color: var(--clr-text-secondary);
    }

    /* — Edit State —————————————————————————————— */
    .input-edit {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--clr-accent);
      color: var(--clr-text-primary);
      font-family: inherit;
      font-size: inherit;
      text-align: right;
      padding: 0 0 2px;
      outline: none;
      position: relative;
      z-index: 5;
      caret-color: var(--clr-accent);
    }

    .input-edit::selection {
      background: rgba(255, 255, 255, 0.2);
    }

    /* — Actions Context ————————————————————————— */
    .action-context {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      transition: opacity 0.3s var(--ease-out-expo);
      display: flex;
    }

    .stats-grid tbody tr:hover .action-context,
    .stats-grid tbody tr:focus-within .action-context {
      opacity: 1;
    }

    .btn-icon {
      background: none;
      border: none;
      color: var(--clr-text-dim);
      cursor: pointer;
      padding: 4px;
      display: grid;
      place-items: center;
      transition: color 0.3s, transform 0.3s var(--ease-out-back);
      -webkit-tap-highlight-color: transparent;
    }

    .btn-icon:hover {
      color: var(--clr-danger);
      transform: scale(1.15);
    }

    .btn-icon svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    /* — Averages Footer (sticky) ———————————————— */
    .stats-grid tfoot {
      position: relative;
      z-index: 15;
    }

    .stats-grid tfoot td {
      background: rgba(5, 5, 5, 0.95);
      border-top: 1px solid var(--clr-border);
      border-bottom: none;
      font-weight: 700;
      color: var(--clr-text-primary);
      padding-top: 20px;
      padding-bottom: 20px;
      transition: color 0.4s, text-shadow 0.4s;
      position: sticky;
      bottom: 0;
    }

    .stats-grid tfoot td:first-child {
      background: rgba(5, 5, 5, 0.95);
      z-index: 30;
    }

    .stats-grid tfoot td::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent);
    }

    /* — Empty State Context ————————————————————— */
    .empty-state {
      position: absolute;
      inset: 0;
      top: var(--row-h);
      /* below header */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s var(--ease-out-expo);
      background: var(--clr-surface);
      z-index: 5;
    }

    .empty-state.is-active {
      opacity: 1;
      pointer-events: auto;
    }

    .empty-icon {
      width: 48px;
      height: 48px;
      color: var(--clr-text-dim);
      stroke-width: 1;
      opacity: 0.6;
    }

    .empty-message {
      color: var(--clr-text-secondary);
      font-size: 0.95rem;
      letter-spacing: 0.04em;
    }

    .empty-hint {
      color: var(--clr-text-dim);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: -4px;
    }

    /* — Floating Action Button ————————————————— */
    .fab-container {
      position: fixed;
      bottom: clamp(24px, 5vw, 48px);
      right: clamp(24px, 5vw, 48px);
      z-index: 100;
    }

    .btn-fab {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--clr-text-primary);
      color: var(--clr-bg);
      border: none;
      cursor: pointer;
      display: grid;
      place-items: center;
      box-shadow:
        0 8px 24px rgba(255, 255, 255, 0.08),
        0 2px 8px rgba(255, 255, 255, 0.06);
      transition: transform 0.4s var(--ease-out-back), box-shadow 0.4s;
      overflow: hidden;
      position: relative;
      opacity: 0;
      /* JS handles reveal */
      -webkit-tap-highlight-color: transparent;
    }

    .btn-fab::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(0, 0, 0, 0.15));
      border-radius: inherit;
    }

    .btn-fab:hover {
      transform: scale(1.06) translateY(-3px);
      box-shadow:
        0 16px 40px rgba(255, 255, 255, 0.15),
        0 4px 12px rgba(255, 255, 255, 0.1);
    }

    .btn-fab:active {
      transform: scale(0.94);
    }

    .btn-fab svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 2.5;
      fill: none;
      position: relative;
      z-index: 2;
    }

    /* — Skeleton Loading Pattern ———————————————— */
    .skeleton-row td span {
      display: block;
      height: 14px;
      width: 100%;
      background: linear-gradient(90deg, var(--clr-text-dim) 0%, var(--clr-text-secondary) 50%, var(--clr-text-dim) 100%);
      background-size: 200% 100%;
      border-radius: 2px;
      opacity: 0.15;
      animation: skeleton-shimmer 2s infinite linear;
    }

    @keyframes skeleton-shimmer {
      to {
        background-position: -200% 0;
      }
    }

    /* — Profile Selector ——————————————————————— */
    .profile-container {
      position: relative;
      margin-top: 16px;
      width: fit-content;
      z-index: 50;
    }

    .profile-trigger {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: 4px;
      padding: 10px 16px;
      color: var(--clr-text-primary);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s var(--ease-out-expo);
      width: 280px;
    }

    .profile-trigger:hover,
    .profile-trigger:focus-visible {
      background: var(--clr-surface-hover);
      border-color: var(--clr-border-active);
    }

    .profile-label {
      color: var(--clr-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.7rem;
    }

    .profile-active-name {
      flex: 1;
      text-align: left;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chevron-icon {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      transition: transform 0.4s var(--ease-out-expo);
    }

    .profile-trigger[aria-expanded="true"] .chevron-icon {
      transform: rotate(180deg);
    }

    .profile-menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      width: 100%;
      background: rgba(10, 10, 10, 0.95);
      border: 1px solid var(--clr-border);
      border-radius: 4px;
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-8px);
      transition: all 0.3s var(--ease-out-expo);
    }

    .profile-menu:not([hidden]) {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .profile-menu-scroll {
      max-height: 240px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--clr-text-dim) transparent;
    }

    .profile-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      color: var(--clr-text-secondary);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      border-bottom: 1px solid var(--clr-border);
    }

    .profile-item:hover,
    .profile-item:focus-within {
      background: var(--clr-surface-hover);
      color: var(--clr-text-primary);
    }

    .profile-item.is-active {
      color: var(--clr-accent);
      font-weight: 700;
    }

    .profile-item-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-delete-profile {
      background: none;
      border: none;
      color: var(--clr-text-dim);
      cursor: pointer;
      padding: 4px;
      display: grid;
      place-items: center;
      border-radius: 2px;
      transition: all 0.2s;
      opacity: 0;
    }

    .profile-item:hover .btn-delete-profile,
    .profile-item:focus-within .btn-delete-profile {
      opacity: 1;
    }

    .btn-delete-profile:hover {
      color: var(--clr-danger);
      background: rgba(255, 255, 255, 0.05);
    }

    .btn-delete-profile svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .profile-menu-actions {
      padding: 8px;
      background: rgba(0, 0, 0, 0.3);
    }

    .btn-new-profile {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: transparent;
      border: 1px dashed var(--clr-text-dim);
      color: var(--clr-text-secondary);
      padding: 10px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-new-profile:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--clr-text-primary);
      border-color: var(--clr-text-secondary);
    }

    .btn-new-profile svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    /* — Modal Dialog ———————————————————————————— */
    .modal-dialog {
      padding: 0;
      border: 1px solid var(--clr-border);
      background: var(--clr-bg);
      border-radius: 6px;
      box-shadow: 0 32px 64px rgba(0, 0, 0, 0.5);
      color: var(--clr-text-primary);
      max-width: 400px;
      width: 90vw;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.4s var(--ease-out-expo), transform 0.4s var(--ease-out-expo);
      margin: auto;
    }

    .modal-dialog[open] {
      opacity: 1;
      transform: translateY(0);
    }

    .modal-dialog::backdrop {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0;
      transition: opacity 0.4s var(--ease-out-expo);
    }

    .modal-dialog[open]::backdrop {
      opacity: 1;
    }

    .modal-content {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .modal-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0;
    }

    .modal-desc {
      color: var(--clr-text-secondary);
      font-size: 0.85rem;
      margin: 0;
      line-height: 1.4;
    }

    .input-modern {
      width: 100%;
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: 4px;
      padding: 12px 16px;
      color: var(--clr-text-primary);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      outline: none;
      transition: all 0.3s;
    }

    .input-modern:focus {
      border-color: var(--clr-border-active);
      background: rgba(255, 255, 255, 0.06);
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 8px;
    }

    .btn-ghost,
    .btn-primary {
      padding: 10px 20px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      cursor: pointer;
      border: none;
      transition: all 0.3s;
    }

    .btn-ghost {
      background: transparent;
      color: var(--clr-text-secondary);
    }

    .btn-ghost:hover {
      background: var(--clr-surface);
      color: var(--clr-text-primary);
    }

    .btn-primary {

    }
  </style>
</head>

  <script>
    /**
     * @file BMetrics — Interactive Logic & State Management
     * @description Vanilla JS with reactive state, Anime.js choreography, localStorage persistence.
     */

    /** Schema: each column definition
     * @typedef {{ key: string, label: string, computed?: boolean, isPct?: boolean }} MetricColumn */

    const METRICS_SCHEMA = Object.freeze([
      { key: 'id', label: '#' },
      { key: 'mpg', label: 'MPG' },
      { key: 'ppg', label: 'PPG', computed: true },
      { key: 'apg', label: 'APG' },
      { key: 'rpg', label: 'RPG' },
      { key: 'spg', label: 'SPG' },
      { key: 'bpg', label: 'BPG' },
      { key: 'topg', label: 'TOPG' },
      { key: 'fgm', label: 'FGM' },
      { key: 'fga', label: 'FGA' },
      { key: 'fgPct', label: 'FG%', computed: true, isPct: true },
      { key: 'tpm', label: '3PM' },
      { key: 'tpa', label: '3PA' },
      { key: 'tpPct', label: '3P%', computed: true, isPct: true },
      { key: 'ftm', label: 'FTM' },
      { key: 'fta', label: 'FTA' },
      { key: 'ftPct', label: 'FT%', computed: true, isPct: true }
    ]);

    /** Column keys that are editable (not computed, not id) */
    const EDITABLE_KEYS = new Set(
      METRICS_SCHEMA.filter(c => !c.computed && c.key !== 'id').map(c => c.key)
    );

    /** Computed column refs for quick lookup */
    const COMPUTED_COLS = METRICS_SCHEMA.filter(c => c.computed);

    const STORAGE_KEY_PROFILES = 'bstats_profiles';
    const STORAGE_KEY_ACTIVE = 'bstats_active_profile';
    const STORAGE_KEY_PREFIX = 'bstats_games_';
    const LEGACY_STORAGE_KEY = 'bstats_games';

    const SEED_DATA = [
      { id: 3, mpg: 36.5, apg: 8.2, rpg: 5.4, spg: 1.2, bpg: 0.8, topg: 2.1, fgm: 11, fga: 22, tpm: 4, tpa: 9, ftm: 6.5, fta: 7 },
      { id: 2, mpg: 34.0, apg: 9.0, rpg: 6.0, spg: 2.0, bpg: 1.0, topg: 1.8, fgm: 9, fga: 18, tpm: 3, tpa: 8, ftm: 7, fta: 8 },
      { id: 1, mpg: 30.0, apg: 10.5, rpg: 4.2, spg: 0.8, bpg: 0.2, topg: 3.5, fgm: 8, fga: 15, tpm: 2, tpa: 6, ftm: 4, fta: 5 }
    ];

    class BMetricsApp {
      /** @type {{ data: object[], sortRef: { key: string|null, asc: boolean } }} */
      #state;
      #profiles;
      #activeProfileId;

      constructor() {
        this.#initProfiles();

        this.#state = {
          data: this.#restoreState(),
          sortRef: { key: null, asc: true }
        };

        this.refs = {
          thead: document.getElementById('table-head-row'),
          tbody: document.getElementById('table-body'),
          tfoot: document.getElementById('footer-row'),
          empty: document.getElementById('empty-state'),
          fab: document.getElementById('add-game-fab'),

          profileToggle: document.getElementById('profile-toggle'),
          profileMenu: document.getElementById('profile-menu'),
          profileList: document.getElementById('profile-list'),
          activeProfileName: document.getElementById('active-profile-name'),
          btnNewProfile: document.getElementById('btn-new-profile'),
          modalNewProfile: document.getElementById('modal-new-profile'),
          inputProfileName: document.getElementById('input-profile-name'),
          btnCancelProfile: document.getElementById('btn-cancel-profile'),
          btnConfirmProfile: document.getElementById('btn-confirm-profile')
        };

        this.#init();
      }

      /* ——— Lifecycle ——————————————————————————— */

      #init() {
        this.#buildStructure();
        this.#hydrateComputed();
        this.#bindGlobalEvents();

        // Brief delay lets skeleton show before data replaces it
        requestAnimationFrame(() => {
          setTimeout(() => {
            this.#render();
            this.#choreographEntrance();
          }, 120);
        });
      }

      /* ——— Profile Management —————————————————— */

      #initProfiles() {
        try {
          const rawProfiles = localStorage.getItem(STORAGE_KEY_PROFILES);
          if (rawProfiles) {
            this.#profiles = JSON.parse(rawProfiles);
            this.#activeProfileId = localStorage.getItem(STORAGE_KEY_ACTIVE) || this.#profiles[0].id;

            // Validate active profile exists
            if (!this.#profiles.find(p => p.id === this.#activeProfileId)) {
              this.#activeProfileId = this.#profiles[0].id;
              localStorage.setItem(STORAGE_KEY_ACTIVE, this.#activeProfileId);
            }
          } else {
            // First time or legacy migration
            this.#profiles = [{ id: 'default', name: 'Player 1' }];
            this.#activeProfileId = 'default';
            localStorage.setItem(STORAGE_KEY_PROFILES, JSON.stringify(this.#profiles));
            localStorage.setItem(STORAGE_KEY_ACTIVE, this.#activeProfileId);

            // Migrate legacy data
            const legacyData = localStorage.getItem(LEGACY_STORAGE_KEY);
            if (legacyData) {
              localStorage.setItem(STORAGE_KEY_PREFIX + 'default', legacyData);
            }
          }
        } catch {
          this.#profiles = [{ id: 'default', name: 'Player 1' }];
          this.#activeProfileId = 'default';
        }
      }

      #saveProfiles() {
        try {
          localStorage.setItem(STORAGE_KEY_PROFILES, JSON.stringify(this.#profiles));
          localStorage.setItem(STORAGE_KEY_ACTIVE, this.#activeProfileId);
        } catch { }
      }

      #renderProfileMenu() {
        const activeProfile = this.#profiles.find(p => p.id === this.#activeProfileId);
        this.refs.activeProfileName.textContent = activeProfile ? activeProfile.name : 'Unknown';

        this.refs.profileList.innerHTML = this.#profiles.map(p => `
          <div class="profile-item ${p.id === this.#activeProfileId ? 'is-active' : ''}" data-id="${p.id}" tabindex="0" role="menuitem">
            <span class="profile-item-name">${p.name}</span>
            ${this.#profiles.length > 1 ? `
            <button class="btn-delete-profile" aria-label="Delete ${p.name}" data-action="delete" data-id="${p.id}">
              <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"/></svg>
            </button>
            ` : ''}
          </div>
        `).join('');

        // Attach events to list items
        this.refs.profileList.querySelectorAll('.profile-item').forEach(item => {
          item.addEventListener('click', (e) => {
            const deleteBtn = e.target.closest('.btn-delete-profile');
            if (deleteBtn) {
              e.stopPropagation();
              this.#handleDeleteProfile(item.dataset.id);
            } else {
              this.#handleSwitchProfile(item.dataset.id);
            }
          });
          item.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.#handleSwitchProfile(item.dataset.id);
            }
          });
        });
      }

      #handleSwitchProfile(id) {
        if (this.#activeProfileId === id) {
          this.#closeProfileMenu();
          return;
        }

        this.#activeProfileId = id;
        this.#saveProfiles();

        // Load new data
        this.#state.data = this.#restoreState();
        this.#state.sortRef = { key: null, asc: true };
        this.#hydrateComputed();

        this.#renderProfileMenu();
        this.#render();
        this.#closeProfileMenu();

        // FLIP or simple entrance anim
        const rows = this.refs.tbody.querySelectorAll('tr.data-row');
        if (rows.length > 0) {
          anime({
            targets: rows,
            opacity: [0, 1],
            translateX: [-10, 0],
            delay: anime.stagger(20),
            duration: 400,
            easing: 'easeOutExpo'
          });
        }
      }

      #handleCreateProfile() {
        const name = this.refs.inputProfileName.value.trim();
        if (!name) return;

        const id = 'p_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        this.#profiles.push({ id, name });
        this.#activeProfileId = id;
        this.#saveProfiles();

        // Init empty data
        this.#state.data = [];
        this.#state.sortRef = { key: null, asc: true };
        this.#persistState(); // write empty array to new key

        this.#closeProfileModal();
        this.#closeProfileMenu();

        this.#renderProfileMenu();
        this.#render();
      }

      #handleDeleteProfile(id) {
        if (this.#profiles.length <= 1) return; // Cannot delete last profile
        const profileToDelete = this.#profiles.find(p => p.id === id);

        if (!confirm(`Are you sure you want to delete the database "${profileToDelete.name}" and all its records? This cannot be undone.`)) {
          return;
        }

        // Remove data from localstorage
        localStorage.removeItem(STORAGE_KEY_PREFIX + id);

        this.#profiles = this.#profiles.filter(p => p.id !== id);

        // If deleted profile was active, switch to the first available
        if (this.#activeProfileId === id) {
          this.#activeProfileId = this.#profiles[0].id;
          this.#state.data = this.#restoreState();
          this.#state.sortRef = { key: null, asc: true };
          this.#hydrateComputed();
          this.#render();
        }

        this.#saveProfiles();
        this.#renderProfileMenu();
      }

      #toggleProfileMenu() {
        const isExpanded = this.refs.profileToggle.getAttribute('aria-expanded') === 'true';
        if (isExpanded) {
          this.#closeProfileMenu();
        } else {
          this.refs.profileMenu.hidden = false;
          this.refs.profileToggle.setAttribute('aria-expanded', 'true');
        }
      }

      #closeProfileMenu() {
        this.refs.profileMenu.hidden = true;
        this.refs.profileToggle.setAttribute('aria-expanded', 'false');
      }

      #openProfileModal() {
        this.#closeProfileMenu();
        this.refs.inputProfileName.value = '';
        this.refs.modalNewProfile.showModal();
        this.refs.btnConfirmProfile.disabled = true;
      }

      #closeProfileModal() {
        this.refs.modalNewProfile.setAttribute('closing', '');
        anime({
          targets: this.refs.modalNewProfile,
          opacity: 0,
          translateY: 20,
          duration: 300,
          easing: 'easeInExpo',
          complete: () => {
            this.refs.modalNewProfile.close();
            this.refs.modalNewProfile.removeAttribute('closing');
            anime.set(this.refs.modalNewProfile, { opacity: '', translateY: '' });
          }
        });
      }

      /* ——— Persistence ————————————————————————— */

      #restoreState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY_PREFIX + this.#activeProfileId);
          if (!raw) return structuredClone(SEED_DATA);
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : structuredClone(SEED_DATA);
        } catch {
          return structuredClone(SEED_DATA);
        }
      }

      #persistState() {
        try {
          localStorage.setItem(STORAGE_KEY_PREFIX + this.#activeProfileId, JSON.stringify(this.#state.data));
        } catch { /* quota exceeded or private mode — silently degrade */ }
      }

      /* ——— Computation ————————————————————————— */

      #hydrateComputed() {
        this.#state.data.forEach(row => this.#computeDerived(row));
      }

      /** Recompute all derived fields for a single row */
      #computeDerived(row) {
        const fga = row.fga || 0;
        const fgm = row.fgm || 0;
        const tpa = row.tpa || 0;
        const tpm = row.tpm || 0;
        const fta = row.fta || 0;
        const ftm = row.ftm || 0;

        row.fgPct = fga > 0 ? (fgm / fga) * 100 : 0;
        row.tpPct = tpa > 0 ? (tpm / tpa) * 100 : 0;
        row.ftPct = fta > 0 ? (ftm / fta) * 100 : 0;

        // PPG = 2pt FG * 2 + 3PM * 3 + FTM
        row.ppg = (Math.max(0, fgm - tpm) * 2) + (tpm * 3) + ftm;
      }

      /** Format a numeric value for display */
      #formatValue(val, isPct = false) {
        if (val == null) return '0';
        if (isPct) return Math.round(val) + '%';
        const n = parseFloat(val);
        if (isNaN(n)) return '0';
        return Number.isInteger(n) ? n.toString() : n.toFixed(1);
      }

      /* ——— DOM Construction ———————————————————— */

      #buildStructure() {
        // --- Table header ---
        this.refs.thead.innerHTML = METRICS_SCHEMA.map(col => {
          const isSortable = col.key !== 'id';
          return `
            <th data-key="${col.key}" scope="col" aria-sort="none"
                ${isSortable ? 'tabindex="0" role="columnheader"' : 'role="columnheader"'}>
              ${col.label}
              ${isSortable ? '<span class="sort-indicator"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg></span>' : ''}
            </th>`;
        }).join('');

        // --- Table footer ---
        this.refs.tfoot.innerHTML = METRICS_SCHEMA.map(col =>
          `<td id="avg-${col.key}" data-key="${col.key}">0</td>`
        ).join('');

        // --- Header sort handlers ---
        this.refs.thead.querySelectorAll('th').forEach(th => {
          if (th.dataset.key === 'id') return; // # column is not sortable
          const handler = () => this.#handleSort(th.dataset.key);
          th.addEventListener('click', handler);
          th.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              handler();
            }
          });
        });
      }

      #bindGlobalEvents() {
        this.refs.fab.addEventListener('click', () => this.#handleAppendRecord());

        // Profile events
        this.refs.profileToggle.addEventListener('click', () => this.#toggleProfileMenu());

        // Close menu on outside click
        document.addEventListener('click', (e) => {
          if (!this.refs.profileToggle.contains(e.target) && !this.refs.profileMenu.contains(e.target)) {
            this.#closeProfileMenu();
          }
        });

        this.refs.btnNewProfile.addEventListener('click', () => this.#openProfileModal());

        this.refs.btnCancelProfile.addEventListener('click', () => this.#closeProfileModal());

        this.refs.btnConfirmProfile.addEventListener('click', () => this.#handleCreateProfile());

        this.refs.inputProfileName.addEventListener('input', (e) => {
          this.refs.btnConfirmProfile.disabled = e.target.value.trim().length === 0;
        });

        this.refs.inputProfileName.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && !this.refs.btnConfirmProfile.disabled) {
            this.#handleCreateProfile();
          }
        });

        // initial render profile menu
        this.#renderProfileMenu();

      }

      /* ——— Rendering ——————————————————————————— */

      #render() {
        this.refs.tbody.innerHTML = '';

        if (this.#state.data.length === 0) {
          this.refs.empty.classList.add('is-active');
          this.refs.empty.setAttribute('aria-hidden', 'false');
          this.refs.tfoot.parentElement.style.opacity = '0';
          return;
        }

        this.refs.empty.classList.remove('is-active');
        this.refs.empty.setAttribute('aria-hidden', 'true');
        this.refs.tfoot.parentElement.style.opacity = '1';

        const fragment = document.createDocumentFragment();
        this.#state.data.forEach(row => fragment.appendChild(this.#buildRowDOM(row)));
        this.refs.tbody.appendChild(fragment);

        this.#updateAggregates(false);
      }

      /** Build a single <tr> element from row data */
      #buildRowDOM(rowData) {
        const tr = document.createElement('tr');
        tr.className = 'data-row';
        tr.dataset.id = rowData.id;

        METRICS_SCHEMA.forEach(col => {
          const td = document.createElement('td');
          td.dataset.key = col.key;

          if (col.key === 'id') {
            td.innerHTML = `
              <div class="action-context">
                <button class="btn-icon" aria-label="Delete game ${rowData.id}">
                  <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"/></svg>
                </button>
              </div>
              <span class="cell-val">${rowData.id}</span>`;
            td.querySelector('.btn-icon').addEventListener('click', e => {
              e.stopPropagation();
              this.#handleDeleteRecord(tr, rowData.id);
            });
          } else if (col.computed) {
            td.className = 'cell-computed';
            td.innerHTML = `<span class="cell-val">${this.#formatValue(rowData[col.key], col.isPct)}</span>`;
          } else {
            td.className = 'cell-interactive';
            td.tabIndex = 0;
            td.innerHTML = `<span class="cell-val">${this.#formatValue(rowData[col.key])}</span>`;

            // Click to edit
            td.addEventListener('click', () => this.#initializeEdit(td, rowData, col));

            // Keyboard: Enter to edit (single bound handler, no leak)
            td.addEventListener('keydown', e => {
              if (e.key === 'Enter' && document.activeElement === td) {
                this.#initializeEdit(td, rowData, col);
              }
            });
          }

          tr.appendChild(td);
        });

        return tr;
      }

      /* ——— Aggregates ————————————————————————— */

      /** Recalculate footer averages; optionally animate changed cells */
      #updateAggregates(animate = true) {
        const data = this.#state.data;
        const len = data.length;
        if (len === 0) return;

        // Accumulate totals (use Number() to include 0 values correctly)
        const acc = {};
        METRICS_SCHEMA.forEach(c => { acc[c.key] = 0; });
        data.forEach(r => {
          METRICS_SCHEMA.forEach(c => {
            acc[c.key] += Number(r[c.key]) || 0;
          });
        });

        // Averages
        const avg = {};
        METRICS_SCHEMA.forEach(c => { avg[c.key] = acc[c.key] / len; });

        // Game count label
        avg.id = len;

        // Weighted percentage averages (true shooting %, not averaged %)
        avg.fgPct = acc.fga > 0 ? (acc.fgm / acc.fga) * 100 : 0;
        avg.tpPct = acc.tpa > 0 ? (acc.tpm / acc.tpa) * 100 : 0;
        avg.ftPct = acc.fta > 0 ? (acc.ftm / acc.fta) * 100 : 0;

        const updatedNodes = [];

        METRICS_SCHEMA.forEach(col => {
          const node = document.getElementById(`avg-${col.key}`);
          if (!node) return;

          let displayVal;
          if (col.key === 'id') {
            displayVal = `${len} GAME${len !== 1 ? 'S' : ''}`;
          } else if (col.computed && col.key !== 'ppg') {
            displayVal = this.#formatValue(avg[col.key], col.isPct);
          } else {
            displayVal = this.#formatValue(avg[col.key]);
          }

          if (node.textContent !== displayVal) {
            node.textContent = displayVal;
            updatedNodes.push(node);
          }
        });

        if (animate && updatedNodes.length) {
          anime({
            targets: updatedNodes,
            color: ['#888888', '#FFFFFF'],
            textShadow: ['0 0 16px rgba(255,255,255,0.5)', 'none'],
            duration: 600,
            easing: 'easeOutExpo'
          });
        }
      }

      /* ——— Inline Edit ————————————————————————— */

      #initializeEdit(tdNode, rowData, colMeta) {
        // Guard: already in edit mode
        if (tdNode.querySelector('input')) return;

        const span = tdNode.querySelector('.cell-val');
        const prevVal = span.textContent;

        const input = document.createElement('input');
        input.type = 'number';
        input.inputMode = 'decimal';
        input.className = 'input-edit';
        input.value = prevVal;
        input.min = '0';
        input.step = 'any';
        input.setAttribute('aria-label', `Edit ${colMeta.label}`);

        span.style.display = 'none';
        tdNode.appendChild(input);
        input.focus();
        input.select();

        let committed = false;

        const commit = () => {
          if (committed) return; // prevent double-fire from blur + Enter
          committed = true;

          const trimmed = input.value.trim();

          // Empty input → revert
          if (trimmed === '') {
            input.remove();
            span.style.display = '';
            return;
          }

          const parsed = parseFloat(trimmed);
          if (isNaN(parsed) || parsed < 0) {
            committed = false; // allow retry
            anime({ targets: input, translateX: [0, -4, 4, -2, 2, 0], duration: 400 });
            input.focus();
            return;
          }

          rowData[colMeta.key] = parsed;
          this.#computeDerived(rowData);
          this.#persistState();

          span.textContent = this.#formatValue(parsed);

          // Update computed cells in this row
          const tr = tdNode.closest('tr');
          COMPUTED_COLS.forEach(c => {
            const tgtSpan = tr.querySelector(`td[data-key="${c.key}"] .cell-val`);
            if (tgtSpan) tgtSpan.textContent = this.#formatValue(rowData[c.key], c.isPct);
          });

          input.remove();
          span.style.display = '';

          // Subtle flash confirmation
          anime({
            targets: tdNode,
            backgroundColor: ['rgba(255,255,255,0.12)', 'transparent'],
            duration: 500,
            easing: 'easeOutExpo'
          });

          this.#updateAggregates(true);
        };

        input.addEventListener('blur', commit);
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
          if (e.key === 'Escape') {
            committed = true; // skip commit logic
            input.remove();
            span.style.display = '';
          }
        });
      }

      /* ——— Record Management ——————————————————— */

      #handleDeleteRecord(trNode, id) {
        this.#state.data = this.#state.data.filter(r => r.id !== id);
        this.#persistState();
        trNode.style.pointerEvents = 'none';

        anime({
          targets: trNode.querySelectorAll('td'),
          opacity: 0,
          paddingTop: 0,
          paddingBottom: 0,
          height: 0,
          duration: 350,
          easing: 'cubicBezier(0.4, 0, 0.2, 1)',
          complete: () => {
            trNode.remove();
            if (this.#state.data.length === 0) this.#render();
            else this.#updateAggregates(true);
          }
        });
      }

      #handleAppendRecord() {
        const ids = this.#state.data.map(d => d.id);
        const nextId = ids.length > 0 ? Math.max(...ids) + 1 : 1;

        const newRecord = { id: nextId };
        METRICS_SCHEMA.forEach(c => {
          if (c.key !== 'id') newRecord[c.key] = 0;
        });

        this.#state.data.unshift(newRecord);
        this.#computeDerived(newRecord);
        this.#persistState();

        if (this.#state.data.length === 1) {
          this.#render();
        } else {
          const tr = this.#buildRowDOM(newRecord);
          this.refs.tbody.prepend(tr);

          anime({
            targets: tr,
            translateY: [-30, 0],
            opacity: [0, 1],
            backgroundColor: ['rgba(255,255,255,0.08)', 'transparent'],
            duration: 600,
            easing: 'easeOutExpo'
          });
        }

        this.#updateAggregates(true);

        // Scroll to top so the new row is visible
        const scrollCtx = this.refs.tbody.closest('.scroll-context');
        if (scrollCtx) scrollCtx.scrollTo({ top: 0, behavior: 'smooth' });
      }

      /* ——— Sorting ————————————————————————————— */

      #handleSort(key) {
        const sortRef = this.#state.sortRef;

        if (sortRef.key === key) {
          sortRef.asc = !sortRef.asc;
        } else {
          sortRef.key = key;
          sortRef.asc = true;
        }

        // Update ARIA
        this.refs.thead.querySelectorAll('th').forEach(th => th.setAttribute('aria-sort', 'none'));
        const activeTh = this.refs.thead.querySelector(`th[data-key="${key}"]`);
        if (activeTh) {
          activeTh.setAttribute('aria-sort', sortRef.asc ? 'ascending' : 'descending');
        }

        // Capture pre-sort positions for FLIP animation
        const rows = Array.from(this.refs.tbody.querySelectorAll('tr.data-row'));
        const rectMap = new Map();
        rows.forEach(r => rectMap.set(r.dataset.id, r.getBoundingClientRect().top));

        // Sort data
        this.#state.data.sort((a, b) => {
          const vA = Number(a[key]) || 0;
          const vB = Number(b[key]) || 0;
          return sortRef.asc ? vA - vB : vB - vA;
        });

        this.#persistState();
        this.#render();

        // FLIP: animate rows to new positions
        const updatedRows = Array.from(this.refs.tbody.querySelectorAll('tr.data-row'));
        updatedRows.forEach((r, i) => {
          const beforeY = rectMap.get(r.dataset.id);
          if (beforeY !== undefined) {
            const afterY = r.getBoundingClientRect().top;
            const delta = beforeY - afterY;
            if (Math.abs(delta) > 1) {
              anime.set(r, { translateY: delta });
              anime({
                targets: r,
                translateY: 0,
                duration: 500,
                easing: 'easeOutExpo',
                delay: i * 20
              });
            }
          }
        });
      }

      /* ——— Entrance Choreography ——————————————— */

      #choreographEntrance() {

        anime.timeline({ easing: 'easeOutExpo' })
          .add({
            targets: '.header-block',
            opacity: [0, 1],
            translateY: [-20, 0],
            duration: 800
          })
          .add({
            targets: '.data-container',
            opacity: [0, 1],
            translateY: [40, 0],
            duration: 800
          }, '-=600')
          .add({
            targets: 'tr.data-row',
            opacity: [0, 1],
            translateX: [-20, 0],
            delay: anime.stagger(40),
            duration: 600
          }, '-=400')
          .add({
            targets: '#footer-row',
            opacity: [0, 1],
            duration: 600
          }, '-=400');

        anime({
          targets: '.btn-fab',
          scale: [0, 1],
          rotate: [-45, 0],
          opacity: [0, 1],
          delay: 800,
          duration: 700,
          easing: 'easeOutBack'
        });
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      window.app = new BMetricsApp();
    });
  </script>
</body>
